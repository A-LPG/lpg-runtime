name: Publish Maven

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Package
        run: mvn -B -DskipTests package
      - name: Deploy
        if: ${{ secrets.OSSRH_USERNAME != '' && secrets.OSSRH_TOKEN != '' }}
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
        run: mvn -B -DskipTests deploy
      - name: Skip notice
        if: ${{ secrets.OSSRH_USERNAME == '' || secrets.OSSRH_TOKEN == '' }}
        run: echo "OSSRH credentials not set; package-only. Configure OSSRH_USERNAME/OSSRH_TOKEN to deploy."
